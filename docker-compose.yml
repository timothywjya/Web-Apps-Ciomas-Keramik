version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ciomas_keramik_db
    environment:
      POSTGRES_DB: ciomas_keramik
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ciomas_keramik_app
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ciomas_keramik
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ciomas-keramik-super-secret-jwt-key-2024
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
